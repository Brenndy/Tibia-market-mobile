<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tibia Market – Mockupy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060912;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 {
      color: #c8a84b;
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: #4a5568;
      text-align: center;
      font-size: 14px;
      margin-bottom: 48px;
    }
    .screens-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
    }
    .screen-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .screen-label {
      color: #c8a84b;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    /* iPhone frame */
    .iphone {
      width: 375px;
      height: 812px;
      background: #1a1a1a;
      border-radius: 54px;
      border: 8px solid #2a2a2a;
      box-shadow:
        0 0 0 1px #3a3a3a,
        0 40px 100px rgba(0,0,0,0.8),
        0 0 60px rgba(200,168,75,0.05);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }
    .screen-content {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      border-radius: 46px;
      background: #0a0e1a;
    }
  </style>
</head>
<body>
  <h1>⚔ Tibia Market</h1>
  <p class="subtitle">Podgląd aplikacji mobilnej iOS</p>

  <div class="screens-grid">

    <!-- Screen 1: Market -->
    <div class="screen-wrap">
      <div class="screen-label">Market</div>
      <div class="iphone">
        <div class="dynamic-island"></div>
        <div class="screen-content">
          <iframe src="screen-market.html" style="width:100%;height:100%;border:none;border-radius:46px;"></iframe>
        </div>
      </div>
    </div>

    <!-- Screen 2: Item Detail -->
    <div class="screen-wrap">
      <div class="screen-label">Szczegóły przedmiotu</div>
      <div class="iphone">
        <div class="dynamic-island"></div>
        <div class="screen-content">
          <iframe src="screen-item.html" style="width:100%;height:100%;border:none;border-radius:46px;"></iframe>
        </div>
      </div>
    </div>

    <!-- Screen 3: Statistics -->
    <div class="screen-wrap">
      <div class="screen-label">Statystyki</div>
      <div class="iphone">
        <div class="dynamic-island"></div>
        <div class="screen-content">
          <iframe src="screen-stats.html" style="width:100%;height:100%;border:none;border-radius:46px;"></iframe>
        </div>
      </div>
    </div>

    <!-- Screen 4: World Select -->
    <div class="screen-wrap">
      <div class="screen-label">Wybór świata</div>
      <div class="iphone">
        <div class="dynamic-island"></div>
        <div class="screen-content">
          <iframe src="screen-worlds.html" style="width:100%;height:100%;border:none;border-radius:46px;"></iframe>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
