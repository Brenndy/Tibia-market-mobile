<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
        background: #0a0e1a;
        color: #e8e6dd;
        overflow: hidden;
      }
      .canvas {
        width: 1200px;
        height: 630px;
        position: relative;
        background:
          radial-gradient(ellipse at 20% 30%, rgba(212, 175, 55, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 70%, rgba(74, 132, 255, 0.1) 0%, transparent 55%),
          linear-gradient(135deg, #0a0e1a 0%, #141a2c 100%);
        overflow: hidden;
      }
      /* Subtle grid */
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(212, 175, 55, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(212, 175, 55, 0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      }
      /* Gold glow accent */
      .glow {
        position: absolute;
        top: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.35), transparent 70%);
        filter: blur(40px);
      }
      .glow2 {
        position: absolute;
        bottom: -150px;
        right: -100px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(74, 132, 255, 0.2), transparent 70%);
        filter: blur(40px);
      }

      .content {
        position: relative;
        padding: 70px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100%;
        z-index: 2;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        border: 1px solid rgba(212, 175, 55, 0.45);
        background: rgba(212, 175, 55, 0.1);
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        color: #d4af37;
        letter-spacing: 2px;
        text-transform: uppercase;
        width: fit-content;
        margin-bottom: 28px;
      }
      .badge::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6bd088;
        box-shadow: 0 0 12px rgba(107, 208, 136, 0.8);
      }

      .title {
        font-size: 120px;
        font-weight: 900;
        letter-spacing: -3px;
        line-height: 0.9;
        margin-bottom: 24px;
        background: linear-gradient(180deg, #f5e8b8 0%, #d4af37 60%, #a38028 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 2px 20px rgba(212, 175, 55, 0.25);
      }
      .title .t1 {
        color: transparent;
      }
      .title .t2 {
        color: transparent;
      }

      .tagline {
        font-size: 30px;
        font-weight: 500;
        line-height: 1.3;
        color: #c8c4b5;
        max-width: 760px;
        margin-bottom: 40px;
      }
      .tagline strong {
        color: #f5e8b8;
        font-weight: 700;
      }

      .features {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
      .feat {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        color: #e8e6dd;
      }
      .feat .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .feat.buy .dot {
        background: #6bd088;
        box-shadow: 0 0 10px rgba(107, 208, 136, 0.7);
      }
      .feat.sell .dot {
        background: #e5665a;
        box-shadow: 0 0 10px rgba(229, 102, 90, 0.7);
      }
      .feat.alert .dot {
        background: #d4af37;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
      }

      /* Decorative crown emblem on right */
      .crown-wrap {
        position: absolute;
        top: 50%;
        right: 80px;
        transform: translateY(-50%);
        width: 320px;
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .coin-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 12px solid;
        border-color: #d4af37 #a38028 #7a5f1e #d4af37;
        box-shadow:
          0 0 60px rgba(212, 175, 55, 0.4),
          inset 0 0 40px rgba(212, 175, 55, 0.2);
        background:
          radial-gradient(circle at 30% 30%, rgba(245, 232, 184, 0.4), transparent 50%),
          linear-gradient(135deg, #5c4718 0%, #2a2010 100%);
      }
      .coin-inner {
        position: absolute;
        inset: 30px;
        border-radius: 50%;
        border: 3px solid rgba(212, 175, 55, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 14, 26, 0.3);
      }
      .crown {
        font-size: 160px;
        line-height: 1;
        color: #d4af37;
        filter: drop-shadow(0 4px 16px rgba(212, 175, 55, 0.6));
      }

      /* Bottom-right URL */
      .url {
        position: absolute;
        bottom: 32px;
        right: 40px;
        font-size: 20px;
        font-weight: 700;
        color: #d4af37;
        letter-spacing: 1px;
        z-index: 3;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="glow"></div>
      <div class="glow2"></div>
      <div class="grid"></div>

      <div class="content">
        <div class="badge">LIVE MARKET DATA</div>

        <h1 class="title"><span class="t1">Tibia</span><span class="t2">Trader</span></h1>

        <p class="tagline">
          Live <strong>Tibia market prices</strong>, flip margins &amp; price alerts across every
          world.
        </p>

        <div class="features">
          <div class="feat buy"><span class="dot"></span>Buy / Sell</div>
          <div class="feat sell"><span class="dot"></span>Margin Analysis</div>
          <div class="feat alert"><span class="dot"></span>Price Alerts</div>
        </div>
      </div>

      <div class="crown-wrap">
        <div class="coin-ring"></div>
        <div class="coin-inner">
          <div class="crown">♛</div>
        </div>
      </div>

      <div class="url">tibiatrader.com</div>
    </div>
  </body>
</html>
