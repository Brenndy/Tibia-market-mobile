name: Feature request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the UX look like? What API / data does it need?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why is your proposal better?

  - type: dropdown
    id: platform
    attributes:
      label: Target platform(s)
      multiple: true
      options:
        - Web
        - iOS
        - Android
        - All
