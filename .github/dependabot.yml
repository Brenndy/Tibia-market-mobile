version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Bundle minor + patch bumps so we don't drown in PRs
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # React Native SDK versions are tied to Expo — let Expo dictate
      - dependency-name: react-native
      - dependency-name: react
      - dependency-name: react-dom

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
