name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly Monday at 07:00 UTC — catches new CVEs on stale deps.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (prod deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail on moderate+ in runtime deps. Dev deps often have low-severity noise
      # that doesn't ship to users; keep them out of the hard fail.
      - run: npm audit --audit-level=moderate --production
